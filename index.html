---
layout: default
section: blog
---

<div class='listing col6 pad4h margin3'>
  {% assign posts = site.categories.blog | sort:'difficulty' %}
  {% for item in  posts %}
    <a class='item' href='{{site.baseurl}}{{item.url}}'>{{item.title}} (difficulty {{item.difficulty}})</a> 
    {{ item.excerpt }}
  {% endfor %}
</div>
