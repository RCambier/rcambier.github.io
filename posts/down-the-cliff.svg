<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="892" viewBox="0 0 1280 892" role="img" aria-labelledby="title desc">
  <title id="title">Down the cliff riddle setup</title>
  <desc id="desc">Question-only illustration showing a 100 meter cliff, a start point at the top, a branch 50 meters below the top, and the available equipment: a 75 meter rope and a knife.</desc>
  <defs>
    <marker id="redArrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f21d1d"/>
    </marker>
    <marker id="blackArrow" viewBox="0 0 10 10" refX="5" refY="5" markerHeight="8" markerWidth="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
    </marker>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1280" height="892" fill="#fbfbfb"/>

  <!-- Equipment card -->
  <rect x="80" y="82" width="335" height="196" rx="16" fill="#fff" stroke="#aaa" stroke-width="2"/>
  <text x="108" y="123" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="700" fill="#111">equipment</text>
  <path d="M115 201 C145 165 182 232 222 193 S292 166 331 203" fill="none" stroke="#f27d09" stroke-width="8" stroke-linecap="round"/>
  <g transform="translate(324 170) rotate(-40)">
    <rect x="-7" y="36" width="24" height="64" rx="5" fill="#8b3f2d" stroke="#5d271c" stroke-width="2"/>
    <path d="M5 0 L34 47 L7 38 L-19 48 Z" fill="#c8c8c8" stroke="#777" stroke-width="2"/>
    <line x1="-3" y1="40" x2="15" y2="40" stroke="#222" stroke-width="3"/>
  </g>
  <text x="108" y="253" font-family="Arial, Helvetica, sans-serif" font-size="27" fill="#111">75 m rope + knife</text>

  <!-- Question setup card -->
  <rect x="80" y="667" width="435" height="135" rx="14" fill="#fff" stroke="#aaa" stroke-width="2"/>
  <text x="99" y="710" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#111">question setup</text>
  <text x="99" y="752" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#111">Get from the top to the bottom</text>
  <text x="99" y="782" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#111">using only the 75 m rope and the knife.</text>

  <!-- Cliff and ground -->
  <rect x="598" y="798" width="631" height="65" fill="#6b963c"/>
  <path d="M700 132 L1085 132 L1085 798 L648 798 C688 700 672 565 682 445 C690 345 682 244 700 132 Z" fill="#b49675"/>
  <path d="M700 132 L1085 132" stroke="#6b963c" stroke-width="12" stroke-linecap="butt"/>
  <rect x="922" y="817" width="108" height="36" rx="9" fill="#fff" stroke="#cfcfcf" stroke-width="2" filter="url(#softShadow)"/>
  <text x="943" y="842" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#111">ground</text>

  <!-- Bush and stump at top -->
  <g fill="#2d7d3b" stroke="#226331" stroke-width="3">
    <circle cx="917" cy="69" r="53"/>
    <circle cx="867" cy="90" r="45"/>
    <circle cx="958" cy="104" r="48"/>
    <circle cx="902" cy="120" r="44"/>
    <circle cx="986" cy="140" r="38"/>
    <rect x="861" y="87" width="126" height="60" rx="25"/>
  </g>
  <g>
    <path d="M875 104 L906 104 L904 141 L877 141 Z" fill="#a66a2f" stroke="#704016" stroke-width="2"/>
    <ellipse cx="890" cy="104" rx="16" ry="4" fill="#7c4b20" stroke="#704016" stroke-width="2"/>
  </g>

  <!-- Person and start label -->
  <g stroke="#000" stroke-width="4" stroke-linecap="round" fill="none">
    <circle cx="820" cy="63" r="13" fill="#000"/>
    <line x1="820" y1="78" x2="820" y2="113"/>
    <line x1="820" y1="91" x2="800" y2="108"/>
    <line x1="820" y1="91" x2="842" y2="108"/>
    <line x1="820" y1="113" x2="800" y2="134"/>
    <line x1="820" y1="113" x2="843" y2="134"/>
  </g>
  <rect x="582" y="31" width="199" height="55" rx="9" fill="#fff" stroke="#bcbcbc" stroke-width="2" filter="url(#softShadow)"/>
  <path d="M779 58 L797 65 L779 72 Z" fill="#fff" stroke="#bcbcbc" stroke-width="2"/>
  <text x="601" y="66" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700" fill="#111">you start here</text>

  <!-- Branch 50 m below top -->
  <path d="M502 487 C560 456 623 459 700 466" fill="none" stroke="#6b3b18" stroke-width="12" stroke-linecap="round"/>
  <path d="M510 487 C545 470 551 455 527 451" fill="none" stroke="#6b3b18" stroke-width="10" stroke-linecap="round"/>
  <rect x="292" y="404" width="280" height="53" rx="10" fill="#fff" stroke="#bcbcbc" stroke-width="2"/>
  <text x="316" y="437" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#111">branch, 50 m below top</text>
  <line x1="700" y1="466" x2="1085" y2="466" stroke="#f21d1d" stroke-width="2" stroke-dasharray="7 7" opacity="0.8"/>

  <!-- Red 50m measurement -->
  <line x1="1042" y1="151" x2="1042" y2="450" stroke="#f21d1d" stroke-width="5" marker-start="url(#redArrow)" marker-end="url(#redArrow)"/>
  <rect x="977" y="290" width="101" height="51" rx="10" fill="#fff" stroke="#f21d1d" stroke-width="3"/>
  <text x="997" y="323" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#111">50 m</text>

  <!-- Full 100m measurement -->
  <line x1="1114" y1="134" x2="1216" y2="134" stroke="#000" stroke-width="3"/>
  <line x1="1114" y1="798" x2="1216" y2="798" stroke="#000" stroke-width="3"/>
  <line x1="1165" y1="148" x2="1165" y2="784" stroke="#000" stroke-width="5" marker-start="url(#blackArrow)" marker-end="url(#blackArrow)"/>
  <rect x="1107" y="427" width="116" height="53" rx="11" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="1128" y="462" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#111">100 m</text>
</svg>
